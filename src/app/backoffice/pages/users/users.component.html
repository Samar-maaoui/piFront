<div class="users-page">
  <div class="page-header">
    <h2>Users</h2>
    <span class="user-count" *ngIf="!loading && users.length > 0">{{ users.length }} users</span>
  </div>

  <!-- Loading state -->
  <p class="state-msg" *ngIf="loading">Loading users…</p>

  <!-- Error state -->
  <div class="error-banner" *ngIf="errorMessage">
    <span>⚠️ {{ errorMessage }}</span>
  </div>

  <!-- Table -->
  <div class="table-wrapper" *ngIf="!loading && !errorMessage && users.length > 0">
    <table class="users-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Email</th>
          <th>Role</th>
          <th>Status</th>
          <th>Joined</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of users" class="clickable-row" (click)="viewUser(user.id)">
          <td class="col-id">{{ user.id }}</td>
          <td class="col-name">{{ user.firstName }} {{ user.lastName }}</td>
          <td class="col-email">{{ user.email }}</td>
          <td class="col-role">
            <span class="role-badge role-{{ user.role | lowercase }}">{{ user.role }}</span>
          </td>
          <td class="col-status">
            <span class="status-badge status-{{ user.accountStatus | lowercase }}">
              {{ user.accountStatus }}
            </span>
          </td>
          <td class="col-date">{{ user.createdAt | date: 'mediumDate' }}</td>
          <td class="col-action">
            <button class="btn-view" (click)="viewUser(user.id); $event.stopPropagation()">View →</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Empty state -->
  <p class="state-msg" *ngIf="!loading && !errorMessage && users.length === 0">No users found.</p>
</div>
