<div class="sd-page">

  <!-- Welcome banner -->
  <div class="fd-welcome-banner">
    <div class="fd-welcome-left">
      <h2>Welcome back, {{ user?.firstName }} 👋</h2>
      <p>Continue your English learning journey. You're doing great!</p>
    </div>
    <span class="fd-role-pill">Student</span>
  </div>

  <!-- Stats -->
  <div class="fd-stats-grid">
    <div class="fd-stat-card">
      <div class="fd-stat-icon">📚</div>
      <div class="fd-stat-info">
        <span class="fd-stat-label">Enrolled Courses</span>
        <span class="fd-stat-value">—</span>
      </div>
    </div>
    <div class="fd-stat-card">
      <div class="fd-stat-icon">✅</div>
      <div class="fd-stat-info">
        <span class="fd-stat-label">Completed</span>
        <span class="fd-stat-value">—</span>
      </div>
    </div>
    <div class="fd-stat-card">
      <div class="fd-stat-icon">⏱️</div>
      <div class="fd-stat-info">
        <span class="fd-stat-label">Hours Studied</span>
        <span class="fd-stat-value">—</span>
      </div>
    </div>
    <div class="fd-stat-card">
      <div class="fd-stat-icon">🏆</div>
      <div class="fd-stat-info">
        <span class="fd-stat-label">Achievements</span>
        <span class="fd-stat-value">—</span>
      </div>
    </div>
  </div>

  <!-- Quick links -->
  <div class="fd-quick-section">
    <h3>Quick Access</h3>
    <div class="fd-quick-links">
      <a [routerLink]="['/student/quiz']" class="fd-quick-link">📚 Quizzes</a>
      <a [routerLink]="['/student/profile']" class="fd-quick-link">👤 My Profile</a>
      <a [routerLink]="['/student/results']" class="fd-quick-link">📈 My Stats</a>
      <a href="#" class="fd-quick-link">💬 My Tutor</a>
    </div>
  </div>

</div>
