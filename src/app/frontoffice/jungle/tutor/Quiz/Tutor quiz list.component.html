<section class="tutor-quiz-list">

  <div class="list-header">
    <div class="list-header-left">
      <h2>My Quizzes</h2>
      <span class="quiz-count" *ngIf="!loading">{{ quizzes.length }} quizzes</span>
    </div>
    <button class="btn-create" (click)="createQuiz()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Quiz
    </button>
  </div>

  <p *ngIf="loading" class="loading">Loading quizzes…</p>

  <div *ngIf="!loading && quizzes.length === 0" class="empty">
    <div class="empty-icon">📋</div>
    <p>No quizzes yet.</p>
    <span>Create your first quiz to get started!</span>
  </div>

  <div class="quiz-grid" *ngIf="!loading && quizzes.length > 0">
    <div class="quiz-card" *ngFor="let quiz of quizzes">

      <!-- Card top accent bar by status -->
      <div class="card-accent"
           [class.accent-published]="quiz.status === 'PUBLISHED'"
           [class.accent-draft]="quiz.status === 'DRAFT'"
           [class.accent-archived]="quiz.status === 'ARCHIVED'">
      </div>

      <!-- Header -->
      <div class="quiz-card-header">
        <h3>{{ quiz.title }}</h3>
        <span class="badge"
              [class.published]="quiz.status === 'PUBLISHED'"
              [class.draft]="quiz.status === 'DRAFT'"
              [class.archived]="quiz.status === 'ARCHIVED'">
          {{ getStatusLabel(quiz.status) }}
        </span>
      </div>

      <!-- Description -->
      <p class="quiz-description">{{ quiz.description || 'No description.' }}</p>

      <!-- Meta row -->
      <div class="quiz-meta">
        <span class="quiz-level" *ngIf="quiz.level">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          {{ quiz.level }}
        </span>
        <span class="quiz-meta-pill" *ngIf="quiz.passingScore">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
          {{ quiz.passingScore }}% pass
        </span>
      </div>

      <!-- Actions -->
      <div class="quiz-card-actions">

        <button class="btn-action btn-edit" title="Edit quiz" (click)="editQuiz(quiz)">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Edit
        </button>

        <button class="btn-action btn-results" title="View results" (click)="viewResults(quiz)">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          Results
        </button>

        <button class="btn-action btn-stats" title="View stats" (click)="viewStats(quiz)">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>
          Stats
        </button>

        <button class="btn-action btn-delete" title="Delete quiz" (click)="deleteQuiz(quiz)">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          Delete
        </button>

      </div>
    </div>
  </div>

</section>
